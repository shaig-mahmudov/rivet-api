services:
  api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/task_management
      DB_USERNAME: task_management
      DB_PASSWORD: task_management
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-before-production-1234567890}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: task_management
      MYSQL_USER: task_management
      MYSQL_PASSWORD: task_management
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -utask_management -ptask_management --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  mysql-data:
