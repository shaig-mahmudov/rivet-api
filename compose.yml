services:
  api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/rivet_api
      DB_USERNAME: rivet_api
      DB_PASSWORD: rivet_api
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-secret-before-production-1234567890}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      TOKEN_BLACKLIST_STORE: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: rivet_api
      MYSQL_USER: rivet_api
      MYSQL_PASSWORD: rivet_api
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -urivet_api -privet_api --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"

volumes:
  mysql-data:
