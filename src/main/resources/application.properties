spring.application.name=rivet-api
spring.profiles.active=dev
server.port=${SERVER_PORT:8080}

app.security.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-before-production-1234567890}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
app.security.jwt.issuer=${JWT_ISSUER:rivet-api}
app.security.refresh-token.expiration-seconds=${REFRESH_TOKEN_EXPIRATION_SECONDS:2592000}
app.security.refresh-token.revoked-retention-seconds=${REFRESH_TOKEN_REVOKED_RETENTION_SECONDS:86400}
app.security.refresh-token.cleanup-interval-ms=${REFRESH_TOKEN_CLEANUP_INTERVAL_MS:3600000}
app.security.admin-bootstrap.token=${ADMIN_BOOTSTRAP_TOKEN:}

spring.jpa.open-in-view=false
